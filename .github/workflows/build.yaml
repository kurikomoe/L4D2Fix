name: Build

on:
  push:
    branches:
      - '*'
    paths-ignore:
      - 'README.md'
      - '.gitignore'
  pull_request:
    paths-ignore:
      - 'README.md'
      - '.gitignore'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.ref }}

    - name: Install xmake
      uses: xmake-io/github-action-setup-xmake@v1
      with:
        xmake-version: latest

    - name: Install just
      uses: extractions/setup-just@v3

    - name: Build
      run: just release

    - name: Upload a Build Artifact
      uses: actions/upload-artifact@v6.0.0
      with:
        path: ./release/
        retention-days: 90
        compression-level: 9
